<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTİF ATLASI</title>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Slab:wght@300;400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══ HERO ══ -->
<div id="hero" class="page active" onclick="showPanoramic()" style="cursor:pointer">
  <img src="varliklar/resimler/hero.jpg" alt="MOTİF ATLASI">
  <div id="hero-hint"></div>
</div>

<!-- ══ PANORAMİK ══ -->
<div id="pano" class="page" style="display:none">
  <nav id="topNav">
    <button onclick="showOverlay('kadin')">Kadinlar</button>
    <button onclick="showOverlay('anadolu')">Anadolu</button>
    <button onclick="showOverlay('motif')">Dokuma</button>
  </nav>

  <div id="panoScroller">
    <div id="panoScene">

      <img id="layer-bg"   class="layer" src="varliklar/resimler/arkaplan.png" draggable="false" alt="">
      <img id="layer-kuzu" class="layer" src="varliklar/resimler/kuzu.png"      draggable="false" alt="">
      <img id="layer-koc"  class="layer" src="varliklar/resimler/koc.png"       draggable="false" alt="">
      <img id="layer-ns"   class="layer" src="varliklar/resimler/obje.png"      draggable="false" alt="">

      <!-- Kadınlar — pointer-events:none, tıklama hotspot divlerden -->
      <img id="layer-k1" class="layer woman" src="varliklar/resimler/kadin1.png" draggable="false" alt="">
      <img id="layer-k2" class="layer woman" src="varliklar/resimler/kadin2.png" draggable="false" alt="">
      <img id="layer-k3" class="layer woman" src="varliklar/resimler/kadin3.png" draggable="false" alt="">
      <img id="layer-k4" class="layer woman" src="varliklar/resimler/kadin4.png" draggable="false" alt="">
      <img id="layer-k5" class="layer woman" src="varliklar/resimler/kadin5.png" draggable="false" alt="">

      <!-- k1→yasam · k2→bereket · k3→akis · k4→guc · k5→nazar -->
      <div class="woman-hotspot" style="left:21%;width:13%;"
           onmouseenter="womanHover(0,true)" onmouseleave="womanHover(0,false)"
           onclick="womanClick(event,0,'yasam')"></div>
      <div class="woman-hotspot" style="left:36%;width:11%;"
           onmouseenter="womanHover(1,true)" onmouseleave="womanHover(1,false)"
           onclick="womanClick(event,1,'bereket')"></div>
      <div class="woman-hotspot" style="left:46%;width:14%;"
           onmouseenter="womanHover(2,true)" onmouseleave="womanHover(2,false)"
           onclick="womanClick(event,2,'akis')"></div>
      <div class="woman-hotspot" style="left:57%;width:16%;"
           onmouseenter="womanHover(3,true)" onmouseleave="womanHover(3,false)"
           onclick="womanClick(event,3,'guc')"></div>
      <div class="woman-hotspot" style="left:69%;width:24%;"
           onmouseenter="womanHover(4,true)" onmouseleave="womanHover(4,false)"
           onclick="womanClick(event,4,'nazar')"></div>

    </div>
  </div>
  <div id="bird"></div>
  <div id="scrollIndicator"><span>KAYDİR</span><span class="arr">→</span></div>
</div>

<!-- ══ KADINLAR ══ -->
<div id="kadin" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('kadin')">✕</button>
  <div class="overlay-content" style="background:#00155c;align-items:center;justify-content:center;padding:0;">
    <video autoplay muted loop playsinline style="width:100%;max-height:100vh;object-fit:contain;display:block;">
      <source src="varliklar/videolar/video-kadin.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- ══ ANADOLU ══ -->
<div id="anadolu" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('anadolu')">✕</button>
  <div class="overlay-content" style="background:#00155c;align-items:center;justify-content:center;padding:0;">
    <video autoplay muted loop playsinline style="width:100%;max-height:100vh;object-fit:contain;display:block;">
      <source src="varliklar/videolar/video-anadolu.mp4" type="video/mp4">
    </video>
  </div>
</div>

<!-- ══ DOKUMA ══ -->
<div id="motif" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('motif')">✕</button>
  <div style="position:fixed;inset:0;background:#87CEEB;">
    <img src="varliklar/resimler/dokuma-gorsel.png" alt="DOKUMA"
         style="width:100%;height:100%;object-fit:contain;display:block;">
  </div>
</div>

<!-- ══ YAŞAM — kadin1 ══ -->
<div id="yasam" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('yasam')">✕</button>
  <div class="overlay-content" style="background:#00155c;">
    <img src="varliklar/resimler/overlay-yasam.jpg" alt="YASAM" style="width:100%;display:block;">
  </div>
</div>

<!-- ══ BEREKET — kadin2 ══ -->
<div id="bereket" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('bereket')">✕</button>
  <div class="overlay-content" style="background:#00155c;">
    <img src="varliklar/resimler/overlay-bereket.jpg" alt="BEREKET" style="width:100%;display:block;">
  </div>
</div>

<!-- ══ AKIŞ — kadin3 ══ -->
<div id="akis" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('akis')">✕</button>
  <div class="overlay-content" style="background:#00155c;">
    <img src="varliklar/resimler/overlay-akis.jpg" alt="AKIS" style="width:100%;display:block;">
  </div>
</div>

<!-- ══ GÜÇ — kadin4 ══ -->
<div id="guc" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('guc')">✕</button>
  <div class="overlay-content" style="background:#00155c;">
    <img src="varliklar/resimler/overlay-guc.jpg" alt="GUC" style="width:100%;display:block;">
  </div>
</div>

<!-- ══ NAZAR — kadin5 ══ -->
<div id="nazar" class="overlay" style="display:none">
  <button class="close-btn" onclick="closeOverlay('nazar')">✕</button>
  <div class="overlay-content" style="background:#00155c;">
    <img src="varliklar/resimler/overlay-nazar.jpg" alt="NAZAR" style="width:100%;display:block;">
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
